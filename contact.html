
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botoman Investments</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f4ed;
color:#333;
line-height:1.6;
}

header{
background:linear-gradient(to right,#5b0000,#800000);
padding:1rem 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:white;
font-size:1.4rem;
font-weight:bold;
}

.menu-toggle{
font-size:2rem;
color:white;
cursor:pointer;
display:none;
}

nav{
display:flex;
gap:1rem;
}

nav a{
color:white;
text-decoration:none;
padding:0.7rem 1rem;
border-radius:6px;
transition:0.3s;
}

nav a:hover{
background:rgba(255,255,255,0.15);
}

.hero{
height:90vh;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.55)),
url('hero.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:2rem;
}

.hero h1{
font-size:3rem;
margin-bottom:1rem;
}

.hero p{
max-width:700px;
margin:auto;
font-size:1.2rem;
}

.btn{
display:inline-block;
margin-top:2rem;
padding:1rem 2rem;
background:#800000;
color:white;
text-decoration:none;
border-radius:30px;
}

section{
padding:5rem 8%;
}

h2{
color:#800000;
margin-bottom:1rem;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:1.5rem;
margin-top:2rem;
}

.card{
background:white;
padding:2rem;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
border-top:5px solid #800000;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:1.5rem;
margin-top:2rem;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:15px;
}

.contact-box{
background:white;
padding:2rem;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

footer{
background:#222;
color:white;
text-align:center;
padding:2rem;
margin-top:2rem;
}

@media(max-width:768px){

.menu-toggle{
display:block;
}

nav{
position:absolute;
top:75px;
left:0;
right:0;
background:#5b0000;
flex-direction:column;
display:none;
padding:1rem;
}

nav.active{
display:flex;
}

.hero h1{
font-size:2rem;
}
}
</style>

</head>

<body>


<header>
<div class="logo">BOTOMAN INVESTMENTS</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav id="navMenu">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="services.html">Services</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
</nav>
</header>



<section>
<h2>Contact Us</h2>

<div class="contact-box">
<p><strong>Phone:</strong> +267 72 984 855</p>
<p><strong>Email:</strong> botomaninvest1975@gmail.com</p>
<p><strong>Location:</strong> Botswana</p>

<br>

<form>
<input type="text" placeholder="Full Name" style="width:100%;padding:1rem;margin-bottom:1rem;">
<input type="email" placeholder="Email Address" style="width:100%;padding:1rem;margin-bottom:1rem;">
<textarea placeholder="Your Message" style="width:100%;padding:1rem;height:150px;"></textarea>
<br><br>
<button class="btn">Send Message</button>
</form>

</div>
</section>



<footer>
<p>© 2026 Botoman Investments Pvt. Ltd. | All Rights Reserved</p>
</footer>



<script>
function toggleMenu(){
document.getElementById('navMenu').classList.toggle('active');
}
</script>


</body>
</html>
